<!DOCTYPE html>
<html lang="hr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - DIGEL 2.dio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db',
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#4b5563',
                            700: '#374151',
                            800: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">

    <!-- Sticky Header -->
    <header class="bg-gray-800 shadow-md sticky top-0 z-10 border-b border-gray-700">
        <div class="max-w-3xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center mb-2">
                <a href="../../index.html" class="text-gray-400 hover:text-white transition-colors flex items-center gap-1 text-sm font-medium">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                    Natrag
                </a>
                <div class="flex items-center gap-4 text-sm font-medium">
                    <div class="bg-gray-700 text-indigo-300 px-3 py-1 rounded-full flex items-center gap-2 border border-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        <span id="timer">00:00</span>
                    </div>
                    <div class="bg-gray-700 text-green-300 px-3 py-1 rounded-full border border-gray-600">
                        Bodovi: <span id="score">0</span>
                    </div>
                </div>
            </div>
            <!-- Progress Bar -->
            <div class="w-full bg-gray-700 rounded-full h-2 overflow-hidden">
                <div id="progress-bar" class="bg-indigo-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="text-right text-xs text-gray-400 mt-1">
                <span id="progress-text">0/0</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-4">
        
        <!-- Loading State -->
        <div id="loading" class="text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500 mx-auto mb-4"></div>
            <p class="text-gray-400">Učitavanje pitanja...</p>
        </div>

        <!-- Quiz Container -->
        <div id="quiz-container" class="w-full max-w-2xl hidden">
            <!-- Question Card -->
            <div class="bg-gray-800 rounded-xl shadow-xl border border-gray-700 overflow-hidden mb-6">
                <div class="p-6 md:p-8">
                    <h2 class="text-xl md:text-2xl font-bold text-white mb-6 leading-tight" id="question-text">
                        Pitanje...
                    </h2>

                    <!-- Options Grid -->
                    <div id="options-container" class="grid grid-cols-1 gap-3">
                        <!-- Options injected by JS -->
                    </div>
                </div>
                
                <!-- Feedback Footer (Hidden initially) -->
                <div id="feedback-area" class="hidden bg-gray-900/50 px-6 py-4 border-t border-gray-700 flex justify-between items-center animate-fade-in">
                    <span id="feedback-message" class="font-medium"></span>
                    <button id="next-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-medium transition-colors shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-gray-900">
                        Dalje
                    </button>
                </div>
            </div>
        </div>

        <!-- Completion Screen -->
        <div id="completion-message" class="hidden w-full max-w-3xl">
            <div class="bg-gray-800 rounded-xl shadow-xl border border-gray-700 p-8 text-center mb-8">
                <div class="w-20 h-20 bg-green-900/30 text-green-400 rounded-full flex items-center justify-center mx-auto mb-6 ring-2 ring-green-900/50">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                </div>
                <h2 class="text-3xl font-bold text-white mb-2">Čestitamo!</h2>
                <p class="text-gray-400 mb-8">Završili ste kviz DIGEL 2.dio.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-gray-700/50 p-4 rounded-lg border border-gray-600">
                        <div class="text-sm text-gray-400 mb-1">Ukupno Bodova</div>
                        <div class="text-2xl font-bold text-indigo-400" id="final-score">0</div>
                    </div>
                    <div class="bg-gray-700/50 p-4 rounded-lg border border-gray-600">
                        <div class="text-sm text-gray-400 mb-1">Točnih Odgovora</div>
                        <div class="text-2xl font-bold text-green-400" id="final-correct">0/0</div>
                    </div>
                    <div class="bg-gray-700/50 p-4 rounded-lg border border-gray-600">
                        <div class="text-sm text-gray-400 mb-1">Vrijeme rješavanja</div>
                        <div class="text-2xl font-bold text-blue-400" id="final-time">00:00</div>
                    </div>
                </div>

                <a href="index.html" class="inline-block bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-lg font-medium transition-colors shadow-lg">
                    Pokreni ponovno
                </a>
            </div>

            <div class="flex items-center gap-2 mb-4 px-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                <h3 class="text-lg font-bold text-gray-300">Pregled rezultata</h3>
            </div>
            
            <div id="results-list" class="space-y-4">
                <!-- Results items injected here -->
            </div>
            
            <div class="mt-8 text-center pb-8">
                <a href="../../index.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">Povratak na početnu stranicu</a>
            </div>
        </div>

    </main>

    <script>
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timerInterval;
        let secondsElapsed = 0;
        let userAnswers = [];

        const loadingEl = document.getElementById('loading');
        const quizContainer = document.getElementById('quiz-container');
        const questionTextEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const scoreEl = document.getElementById('score');
        const completionMessageEl = document.getElementById('completion-message');
        const finalScoreEl = document.getElementById('final-score');
        const finalCorrectEl = document.getElementById('final-correct');
        const timerEl = document.getElementById('timer');
        const nextBtn = document.getElementById('next-btn');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackMessage = document.getElementById('feedback-message');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const finalTimeEl = document.getElementById('final-time');
        const resultsListEl = document.getElementById('results-list');

        function formatTime(totalSeconds) {
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                secondsElapsed++;
                timerEl.textContent = formatTime(secondsElapsed);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function updateProgress() {
            const current = currentQuestionIndex + 1;
            const total = questions.length;
            const percentage = (currentQuestionIndex / total) * 100;
            
            progressBar.style.width = `${percentage}%`;
            progressText.textContent = `${currentQuestionIndex}/${total}`;
        }

        fetch('quiz.json')
            .then(response => response.json())
            .then(data => {
                questions = shuffleArray(data);
                loadingEl.classList.add('hidden');
                quizContainer.classList.remove('hidden');
                startTimer();
                updateProgress();
                showQuestion();
            })
            .catch(error => {
                console.error('Error loading quiz:', error);
                loadingEl.innerHTML = '<p class="text-red-400">Greška pri učitavanju pitanja.</p>';
            });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showQuestion() {
            if (currentQuestionIndex >= questions.length) {
                return showCompletionMessage();
            }

            const currentCard = questions[currentQuestionIndex];
            
            // Clean state
            questionTextEl.textContent = currentCard.question;
            optionsContainer.innerHTML = '';
            feedbackArea.classList.add('hidden');
            
            // Determine correct text
            const correctIndex = parseInt(currentCard.correct);
            const correctAnswerText = currentCard.answers[correctIndex];

            // Create options copy to shuffle
            const allOptions = [...currentCard.answers];
            const shuffledOptions = shuffleArray(allOptions);

            shuffledOptions.forEach(option => {
                const button = document.createElement('button');
                // Dark mode styles for button
                button.className = 'w-full text-left p-4 rounded-lg border border-gray-600 bg-gray-700 hover:bg-gray-600 hover:border-indigo-400 transition-all duration-200 font-medium text-gray-200 shadow-sm';
                button.textContent = option;
                button.onclick = () => handleAnswer(button, option, correctAnswerText, currentCard.question);
                optionsContainer.appendChild(button);
            });
            
            updateProgress();
        }

        function handleAnswer(selectedButton, selectedOption, correctAnswerText, questionText) {
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.disabled = true;
                btn.classList.add('cursor-default');
                btn.classList.remove('hover:bg-gray-600', 'hover:border-indigo-400');
            });

            const isCorrect = selectedOption === correctAnswerText;

            userAnswers.push({
                question: questionText,
                userAnswer: selectedOption,
                correctAnswer: correctAnswerText,
                isCorrect: isCorrect
            });

            if (isCorrect) {
                score++;
                scoreEl.textContent = score;
                selectedButton.className = 'w-full text-left p-4 rounded-lg border-2 border-green-500 bg-green-900/40 text-green-100 font-bold shadow-md';
                
                feedbackMessage.textContent = "Točan odgovor!";
                feedbackMessage.className = "font-bold text-green-400";
            } else {
                selectedButton.className = 'w-full text-left p-4 rounded-lg border-2 border-red-500 bg-red-900/40 text-red-100 font-medium shadow-md';
                
                buttons.forEach(btn => {
                    if (btn.textContent === correctAnswerText) {
                        btn.className = 'w-full text-left p-4 rounded-lg border-2 border-green-500 bg-green-900/40 text-green-100 font-bold shadow-md';
                    }
                });

                feedbackMessage.textContent = "Netočno. Točan odgovor je označen.";
                feedbackMessage.className = "font-bold text-red-400";
            }

            feedbackArea.classList.remove('hidden');
            
            nextBtn.onclick = () => {
                currentQuestionIndex++;
                showQuestion();
            };
        }

        function showCompletionMessage() {
            stopTimer();
            quizContainer.classList.add('hidden');
            completionMessageEl.classList.remove('hidden');
            
            finalScoreEl.textContent = score;
            finalCorrectEl.textContent = `${score}/${questions.length}`;
            finalTimeEl.textContent = formatTime(secondsElapsed);

            resultsListEl.innerHTML = '';
            
            userAnswers.forEach((item, index) => {
                const reportCard = document.createElement('div');
                // Status styles
                const isCorrect = item.isCorrect;
                const borderClass = isCorrect ? 'border-green-800' : 'border-red-800';
                const bgClass = isCorrect ? 'bg-green-900/10' : 'bg-red-900/10';
                
                reportCard.className = `bg-gray-800 border rounded-lg p-4 shadow-sm flex flex-col gap-2 ${borderClass} ${bgClass}`;
                
                const statusBadge = isCorrect 
                    ? '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-900/60 text-green-300 border border-green-700">Točno</span>'
                    : '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-900/60 text-red-300 border border-red-700">Netočno</span>';

                reportCard.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-medium text-gray-500 uppercase tracking-wide">Pitanje ${index + 1}</span>
                        ${statusBadge}
                    </div>
                    <h4 class="font-semibold text-gray-100 text-lg mb-2">${item.question}</h4>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <div class="p-3 bg-gray-700/50 rounded border border-gray-600">
                            <span class="block text-xs text-gray-400 mb-1">Vaš odgovor:</span>
                            <span class="font-medium ${isCorrect ? 'text-green-400' : 'text-red-400'}">${item.userAnswer}</span>
                        </div>
                        ${!isCorrect ? `
                        <div class="p-3 bg-gray-700/50 rounded border border-gray-600">
                            <span class="block text-xs text-gray-400 mb-1">Točan odgovor:</span>
                            <span class="font-medium text-green-400">${item.correctAnswer}</span>
                        </div>` : ''}
                    </div>
                `;
                resultsListEl.appendChild(reportCard);
            });
        }
    </script>
</body>
</html>
