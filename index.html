<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
  </style> 
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-200">
  <!-- Navbar -->
  <nav class="bg-white dark:bg-gray-800 shadow-md fixed w-full z-10 top-0">
    <div class="container mx-auto flex justify-between items-center px-4 py-3">
      <a href="/" class="text-xl font-bold text-black dark:text-white">Quiz</a>
      <a href="https://ivanb.eu/" class="dark:text-white text-sm">By Ivan.B</a>   

    </div>
  </nav>

  <!-- Main Content -->
  <div class="container mx-auto mt-20 px-4">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Quiz Cards -->
       <!-- KOM VJ 1.kol -->
      <div class="bg-white dark:bg-gray-800 shadow-lg rounded-lg p-4">
        <h2 class="text-lg font-semibold dark:text-white">Kom.Vj.Kol.1</h2>
        <p class="text-gray-600 dark:text-gray-400">Pitanja: 20 | 5 - 15 min</p>
        <script>
          fetch('../quiz/komvj1/quiz.json')
            .then(response => response.json())
            .then(data => {
              const questionCount = data.length;
              document.getElementById('komvj-question-count').innerText = `ⓘ 20 nasumičnih pitanja iz baze od ${questionCount}`;
            });
        </script>
        <p id="komvj-question-count" class="text-gray-600 dark:text-gray-400 text-xs"></p>
        <a href="/quiz/komvj1" class="block mt-4 bg-blue-600 text-white text-center py-2 rounded hover:bg-blue-700 dark:bg-blue-800 dark:hover:bg-blue-600">
          Pokreni →
        </a>

      </div>
      <!-- IGIP 1.kol -->
      <div class="bg-white dark:bg-gray-800 shadow-lg rounded-lg p-4">
        <h2 class="text-lg font-semibold dark:text-white">IGIP.Kol.1</h2>
        <p class="text-gray-600 dark:text-gray-400">Pitanja: 20 | 5 - 15 min</p>
        <script>
          fetch('../quiz/igip1/quiz.json')
            .then(response => response.json())
            .then(data => {
              const questionCount = data.length;
              document.getElementById('igip-question-count').innerText = `ⓘ 20 nasumičnih pitanja iz baze od ${questionCount}`;
            });
        </script>
        <p id="igip-question-count" class="text-gray-600 dark:text-gray-400 text-xs"></p>
        <a href="/quiz/igip1" class="block mt-4 bg-blue-600 text-white text-center py-2 rounded hover:bg-blue-700 dark:bg-blue-800 dark:hover:bg-blue-600">
          Pokreni →
        </a>
      </div>

    </div>
  </div>
</body>
</html>
